<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Gudang</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        
        .login-box {
            max-width: 350px;
            margin: 80px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            font-family: sans-serif;
        }
        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-box button {
            width: 96%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-logout {
            padding: 8px 15px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="halaman-login" class="login-box" style="display: block;">
        <h2>Login Sistem</h2>
        <p>Silahkan masuk untuk mengakses stok</p>
        <input type="email" id="login-email" placeholder="Email Karyawan">
        <input type="password" id="login-password" placeholder="Password">
        <button id="btn-login">Masuk</button>
    </div>


    <div class="container" id="aplikasi-stok" style="display: none;">
        <h2>Data Stok Gudang</h2>

        <div class="input-section">
            <input type="text" id="namaBarang" placeholder="Nama Barang...">
            <input type="number" id="jumlahBarang" placeholder="Jumlah">
            <button class="btn-tambah">Tambah</button>
        </div>

        <table class="table-stok">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Barang</th>
                    <th>Qty</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Kardus Sedang</td>
                    <td>150</td>
                    <td><button class="btn-hapus">Hapus</button></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Lakban Bening</td>
                    <td>45</td>
                    <td><button class="btn-hapus">Hapus</button></td>
                </tr>
            </tbody>
        </table>

        <button id="btn-logout" class="btn-logout">Keluar / Logout</button>
    </div>

    <script src="script1.js"></script>

    <script type="module">
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        
        const firebaseConfig = { 
  apiKey : "AIzaSyBo4-RhVpVH7d3KsnoW5qnGjpDq-13jsWc" , 
  authDomain : "projectstok.firebaseapp.com" , 
  ID proyek : "projectstok" , 
  storageBucket : "projectstok.firebasestorage.app" , 
  messagingSenderId : "170554374798" , 
  ID aplikasi : "1:170554374798:web:ef3d67e014b88e68db27df" , 
  ID pengukuran : "G-10YDGDMY2Q" 
};

        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        
        const divLogin = document.getElementById("halaman-login");
        const divStok = document.getElementById("aplikasi-stok");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                
                divLogin.style.display = "none";
                divStok.style.display = "block";
            } else {
                divLogin.style.display = "block";
                divStok.style.display = "none";
            }
        });
        document.getElementById("btn-login").addEventListener("click", () => {
            const email = document.getElementById("login-email").value;
            const sandi = document.getElementById("login-password").value;

            signInWithEmailAndPassword(auth, email, sandi)
                .then(() => {
                    alert("Berhasil Masuk!");
                })
                .catch((error) => {
    alert("Error: " + error.message);
});
        document.getElementById("btn-logout").addEventListener("click", () => {
            signOut(auth).then(() => {
                alert("Anda telah keluar.");
            });
        });
    </script>
</body>
</html>
